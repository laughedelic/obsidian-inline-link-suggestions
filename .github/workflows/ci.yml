name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    uses: laughedelic/gha-obsidian/.github/workflows/ci.yml@main
    with:
      node-version: "22"

  e2e-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      # Caches the Obsidian build(s) wdio-obsidian-service downloads.
      - uses: actions/cache@v4
        with:
          path: .obsidian-cache
          key: obsidian-cache-${{ runner.os }}-latest

      # Obsidian is an Electron app and needs a display even "headless" in CI.
      - run: xvfb-run --auto-servernum npm run test:e2e

  e2e-test-mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - uses: actions/cache@v4
        with:
          path: .obsidian-cache
          key: obsidian-cache-${{ runner.os }}-latest

      # Same suite, run under Obsidian's mobile emulation (still Electron;
      # see README's "Mobile testing" section).
      - run: xvfb-run --auto-servernum npm run test:e2e:mobile
